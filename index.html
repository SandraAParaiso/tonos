<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Síntesis de Sonido</title>

<style>
  :root {
    --bg: #ffffff;
    --surface2: #f4f5f8;
    --border: #d0d4de;
    --accent: #1a4ed8;
    --accent2: #dc2626;
    --accent3: #6d28d9;
    --text: #0f172a;
    --text-muted: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    color: var(--text);
    font-family: Verdana, Geneva, sans-serif;
    min-height: 100vh;
  }

  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 36px 24px 48px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: Verdana, Geneva, sans-serif;
    font-weight: 800;
    font-size: clamp(1.8rem, 4vw, 3rem);
    letter-spacing: -1px;
    color: #0f172a;
  }

  header p {
    color: var(--text-muted);
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .panel-title {
    font-family: Verdana, Geneva, sans-serif;
    font-weight: 700;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* Tone rows — fixed grid so columns never overlap */
  .tone-row {
    display: grid;
    grid-template-columns: 10px 28px 68px 1fr 50px 18px auto 30px;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding: 9px 10px;
    background: var(--surface2);
    border-radius: 7px;
    border: 1.5px solid var(--border);
    transition: border-color 0.2s, background 0.2s;
  }

  .tone-row.active {
    border-color: var(--accent);
    background: #eef2ff;
  }

  .tone-color {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .tone-label {
    font-size: 0.62rem;
    color: var(--text-muted);
    text-align: center;
  }

  .freq-display {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text);
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Sliders col: freq+amp stacked */
  .sliders-col {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .slider-label {
    font-size: 0.55rem;
    color: var(--text-muted);
    min-width: 22px;
    text-align: right;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
    min-width: 0;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1.5px var(--accent);
    transition: transform 0.1s;
  }

  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.25); }

  .amp-range::-webkit-slider-thumb {
    background: var(--accent3);
    box-shadow: 0 0 0 1.5px var(--accent3);
  }

  /* Checkbox */
  .checkbox-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  input[type="checkbox"] {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    background: #fff;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  input[type="checkbox"]:checked::after {
    content: '✓';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 9px;
    color: #fff;
    font-weight: 700;
    line-height: 1;
  }

  /* Buttons */
  .btn {
    font-family: Verdana, Geneva, sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    padding: 7px 11px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    line-height: 1.2;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); background: #eef2ff; }

  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  .btn-primary:hover { background: #1340b0; border-color: #1340b0; color: #fff; }

  .btn-stop { border-color: var(--accent2); color: var(--accent2); }
  .btn-stop:hover { background: var(--accent2); color: #fff; }

  .btn-sm { padding: 5px 8px; font-size: 0.58rem; }

  .btn-play-tone { background: #fff; }
  .btn-playing-tone { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  .btn-remove { border-color: #fca5a5; color: var(--accent2); background: #fff; }
  .btn-remove:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  .btn-complex { background: #fff; }
  .btn-complex-playing { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  .controls-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  /* Canvas */
  .canvas-wrap {
    border: 1px solid var(--border);
    border-radius: 7px;
    overflow: hidden;
    background: #f8faff;
  }

  .canvas-meta {
    padding: 5px 12px;
    background: #f0f3fb;
    border-bottom: 1px solid var(--border);
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .canvas-meta strong { color: var(--accent); }

  canvas { display: block; width: 100%; }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
    min-height: 18px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.6rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Complex bottom */
  .complex-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
  }

  .full-width { grid-column: 1 / -1; }

  /* Status */
  .status-bar {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.62rem;
    margin-top: 20px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
    letter-spacing: 0.07em;
  }

  .sep {
    display: inline-block;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--border);
    vertical-align: middle;
    margin: 0 8px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Síntesis de Tonos</h1>
    <p>Generador de tonos puros · Suma de señales · Visualización en tiempo real</p>
  </header>

  <div class="grid">
    <div class="panel">
      <div class="panel-title">Tonos Puros</div>
      <div id="tones-list"></div>
      <div class="controls-row">
        <button class="btn btn-primary" onclick="addTone()">+ Añadir tono</button>
        <button class="btn btn-stop" onclick="stopAll()">■ Detener todo</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Forma de Onda Individual</div>
      <div class="canvas-wrap">
        <div class="canvas-meta">Amplitud <strong>A(t)</strong> vs Tiempo <strong>t</strong></div>
        <canvas id="canvas-individual" width="600" height="180"></canvas>
      </div>
      <div class="legend" id="legend-individual"></div>
    </div>

    <div class="panel full-width">
      <div class="panel-title">Señal Compleja — Suma de Tonos Seleccionados</div>
      <div class="canvas-wrap">
        <div class="canvas-meta">Amplitud <strong>Σ A(t)</strong> vs Tiempo <strong>t</strong></div>
        <canvas id="canvas-complex" width="1100" height="200"></canvas>
      </div>
      <div class="complex-bottom">
        <div class="legend" id="legend-complex"></div>
        <button class="btn btn-complex" id="btn-play-complex" onclick="toggleComplex()">▶ Reproducir señal compleja</button>
      </div>
    </div>
  </div>

  <div class="status-bar" id="status">
    Listo<span class="sep"></span>0 tonos<span class="sep"></span>fs = 44100 Hz
  </div>
</div>

<script>
const COLORS = ['#2563eb','#7c3aed','#db2777','#059669','#d97706','#0891b2','#dc2626','#65a30d'];

let audioCtx = null, tones = [], nextId = 0, complexNodes = null, complexPlaying = false;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function addTone() {
  const id = nextId++;
  const presets = [220, 440, 660, 880, 110, 330, 550, 770];
  const freq = presets[tones.length % presets.length] || 440;
  tones.push({ id, freq, amp: 0.5, active: false, oscillator: null, gainNode: null, selected: true, color: COLORS[id % COLORS.length] });
  renderTones(); drawAll();
}

function renderTones() {
  const list = document.getElementById('tones-list');
  list.innerHTML = '';
  tones.forEach(t => {
    const row = document.createElement('div');
    row.className = 'tone-row' + (t.active ? ' active' : '');
    row.innerHTML = `
      <div class="tone-color" style="background:${t.color}"></div>
      <span class="tone-label">T${t.id + 1}</span>
      <span class="freq-display" id="fd-${t.id}">${Math.round(t.freq)} Hz</span>
      <div class="sliders-col">
        <div class="slider-row">
          <span class="slider-label">Hz</span>
          <input type="range" min="20" max="2000" step="1" value="${t.freq}" oninput="updateFreq(${t.id}, this.value)">
        </div>
        <div class="slider-row">
          <span class="slider-label">Amp</span>
          <input type="range" class="amp-range" min="0.01" max="1" step="0.01" value="${t.amp}" oninput="updateAmp(${t.id}, this.value)">
        </div>
      </div>
      <div class="checkbox-wrap" title="Incluir en señal compleja">
        <input type="checkbox" ${t.selected ? 'checked' : ''} onchange="updateSelected(${t.id}, this.checked)">
      </div>
      <span class="slider-label" style="font-size:0.55rem; color:#94a3b8; text-align:center; line-height:1.2;">incl.<br>compleja</span>
      <button class="btn btn-sm ${t.active ? 'btn-playing-tone' : 'btn-play-tone'}" onclick="toggleTone(${t.id})">${t.active ? '■' : '▶'}</button>
      <button class="btn btn-sm btn-remove" onclick="removeTone(${t.id})">✕</button>
    `;
    list.appendChild(row);
  });
  updateLegends(); updateStatus();
}

function updateFreq(id, val) {
  const t = tones.find(x => x.id === id); if (!t) return;
  t.freq = parseFloat(val);
  const el = document.getElementById('fd-' + id);
  if (el) el.textContent = Math.round(t.freq) + ' Hz';
  if (t.oscillator) t.oscillator.frequency.setValueAtTime(t.freq, getAudioCtx().currentTime);
  drawAll();
}

function updateAmp(id, val) {
  const t = tones.find(x => x.id === id); if (!t) return;
  t.amp = parseFloat(val);
  if (t.gainNode) t.gainNode.gain.setValueAtTime(t.amp * 0.3, getAudioCtx().currentTime);
  drawAll();
}

function updateSelected(id, val) {
  const t = tones.find(x => x.id === id);
  if (t) { t.selected = val; drawAll(); }
}

function toggleTone(id) {
  const t = tones.find(x => x.id === id); if (!t) return;
  t.active ? stopTone(t) : playTone(t);
  renderTones();
}

function playTone(t) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(t.freq, ctx.currentTime);
  gain.gain.setValueAtTime(t.amp * 0.3, ctx.currentTime);
  osc.connect(gain); gain.connect(ctx.destination); osc.start();
  t.oscillator = osc; t.gainNode = gain; t.active = true;
}

function stopTone(t) {
  if (t.oscillator) { try { t.oscillator.stop(); t.oscillator.disconnect(); } catch(e) {} t.oscillator = null; t.gainNode = null; }
  t.active = false;
}

function removeTone(id) {
  const idx = tones.findIndex(x => x.id === id); if (idx < 0) return;
  stopTone(tones[idx]); tones.splice(idx, 1);
  renderTones(); drawAll();
}

function stopAll() { tones.forEach(stopTone); stopComplex(); renderTones(); }

function toggleComplex() { complexPlaying ? stopComplex() : playComplex(); }

function playComplex() {
  const sel = tones.filter(t => t.selected); if (!sel.length) return;
  const ctx = getAudioCtx();
  complexNodes = sel.map(t => {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(t.freq, ctx.currentTime);
    gain.gain.setValueAtTime((t.amp * 0.3) / sel.length, ctx.currentTime);
    osc.connect(gain); gain.connect(ctx.destination); osc.start();
    return { osc, gain };
  });
  complexPlaying = true;
  const btn = document.getElementById('btn-play-complex');
  btn.className = 'btn btn-complex-playing';
  btn.textContent = '■ Detener señal compleja';
}

function stopComplex() {
  if (complexNodes) { complexNodes.forEach(n => { try { n.osc.stop(); n.osc.disconnect(); } catch(e) {} }); complexNodes = null; }
  complexPlaying = false;
  const btn = document.getElementById('btn-play-complex');
  btn.className = 'btn btn-complex';
  btn.textContent = '▶ Reproducir señal compleja';
}

// Drawing
function drawAll() { drawIndividual(); drawComplex(); }

function getTimeWindow(arr) {
  if (!arr.length) return 0.01;
  const minF = Math.min(...arr.map(t => t.freq));
  return Math.max(3, Math.min(6, Math.round(minF / 50))) / minF;
}

function drawGrid(ctx, W, H) {
  ctx.strokeStyle = 'rgba(26,78,216,0.07)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) { const y = (i/4)*H; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  for (let i = 0; i <= 8; i++) { const x = (i/8)*W; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  ctx.strokeStyle = 'rgba(26,78,216,0.18)'; ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
  ctx.setLineDash([]);
}

function drawAxisLabels(ctx, W, H, T) {
  ctx.fillStyle = '#94a3b8'; ctx.font = '10px Verdana, Geneva, sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i <= 4; i++) ctx.fillText(((i/4)*T*1000).toFixed(1)+'ms', (i/4)*W, H-4);
  ctx.textAlign = 'left';
  ctx.fillText('+1', 4, 13); ctx.fillText(' 0', 4, H/2+4); ctx.fillText('-1', 4, H-6);
}

function drawIndividual() {
  const canvas = document.getElementById('canvas-individual');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#f8faff'; ctx.fillRect(0,0,W,H);
  drawGrid(ctx, W, H);
  if (!tones.length) {
    ctx.fillStyle = '#94a3b8'; ctx.font = '11px Verdana, Geneva, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Añade un tono para ver la forma de onda', W/2, H/2); return;
  }
  const T = getTimeWindow(tones), N = 800;
  tones.forEach(t => {
    ctx.beginPath(); ctx.strokeStyle = t.color; ctx.lineWidth = 1.8; ctx.globalAlpha = 0.85;
    for (let i = 0; i <= N; i++) {
      const y = t.amp * Math.sin(2*Math.PI*t.freq*(i/N)*T);
      const px = (i/N)*W, py = H/2 - y*(H*0.38);
      i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
    }
    ctx.stroke(); ctx.globalAlpha = 1;
  });
  drawAxisLabels(ctx, W, H, T);
}

function drawComplex() {
  const canvas = document.getElementById('canvas-complex');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#f8faff'; ctx.fillRect(0,0,W,H);
  drawGrid(ctx, W, H);
  const sel = tones.filter(t => t.selected);
  if (!sel.length) {
    ctx.fillStyle = '#94a3b8'; ctx.font = '11px Verdana, Geneva, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Marca el checkbox de un tono para incluirlo en la señal compleja', W/2, H/2); return;
  }
  const T = getTimeWindow(sel), N = 1200;
  sel.forEach(t => {
    ctx.beginPath(); ctx.strokeStyle = t.color; ctx.lineWidth = 1; ctx.globalAlpha = 0.2;
    for (let i = 0; i <= N; i++) {
      const y = t.amp*Math.sin(2*Math.PI*t.freq*(i/N)*T);
      const px = (i/N)*W, py = H/2-y*(H*0.28);
      i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
    }
    ctx.stroke(); ctx.globalAlpha = 1;
  });
  const maxAmp = sel.reduce((s,t) => s+t.amp, 0) || 1;
  ctx.beginPath(); ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 2;
  for (let i = 0; i <= N; i++) {
    let sum = 0; sel.forEach(t => { sum += t.amp*Math.sin(2*Math.PI*t.freq*(i/N)*T); });
    const px = (i/N)*W, py = H/2-(sum/maxAmp)*(H*0.38);
    i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.stroke();
  drawAxisLabels(ctx, W, H, T);
}

function updateLegends() {
  document.getElementById('legend-individual').innerHTML = tones.map(t =>
    `<div class="legend-item"><div class="legend-dot" style="background:${t.color}"></div>T${t.id+1}: ${Math.round(t.freq)} Hz</div>`).join('');
  const sel = tones.filter(t => t.selected);
  document.getElementById('legend-complex').innerHTML = sel.map(t =>
    `<div class="legend-item"><div class="legend-dot" style="background:${t.color}"></div>${Math.round(t.freq)} Hz</div>`).join('') +
    (sel.length ? `<div class="legend-item"><div class="legend-dot" style="background:#0f172a"></div>Σ Señal compleja</div>` : '');
}

function updateStatus() {
  const active = tones.filter(t => t.active).length;
  const sel = tones.filter(t => t.selected).length;
  document.getElementById('status').innerHTML =
    `${tones.length} tono${tones.length!==1?'s':''} &nbsp;·&nbsp; ${active} activo${active!==1?'s':''} &nbsp;·&nbsp; ${sel} en señal compleja`;
}

function resizeCanvases() {
  const dpr = window.devicePixelRatio || 1;
  ['canvas-individual','canvas-complex'].forEach(id => {
    const c = document.getElementById(id);
    const h = c.height;
    c.width = c.parentElement.clientWidth * dpr;
    c.height = h;
  });
  drawAll();
}

window.addEventListener('resize', resizeCanvases);
addTone(); addTone();
tones[1].freq = 880;
renderTones();
setTimeout(resizeCanvases, 80);
</script>
</body>
</html>
